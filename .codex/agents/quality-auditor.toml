- `skills/testing-strategy/SKILL.md`

## Preferred tools

- Roslyn MCP diagnostics, references, and project graph.
- `dotnet build` and `dotnet test`.
- Markdown link checks.

## Load these files

- `rules/architecture-boundaries.md`
- `rules/winui-codebehind.md`
